# STAFF_TO_TARGET = Staff wird zum Spieler teleportiert.
# TARGET_TO_STAFF = Spieler wird zum Staff teleportiert.
# FIXED_LOCATION = Staff und Spieler werden zu der Location unten teleportiert.
teleport-mode: FIXED_LOCATION

screenshare-location:
  enabled: true
  world: world
  x: 0.5
  y: 80.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

freeze:
  prevent-flying-kick: true
  cancel-flying-kick: true
  lock-head: true
  block-inventory: true
  close-inventory-tick: true

messages:
prefix: "&8[&bSS&8] &7"
no-permission: "&cYou do not have permission to do that."
only-players: "&cOnly players can use this command."
player-not-found: "&cPlayer not found."
cannot-freeze-bypass: "&cThis player cannot be frozen."
already-frozen: "&cThis player is already frozen."
frozen-staff: "&a%player% has been frozen for a screenshare."
frozen-target: "&cYou have been frozen for a screenshare. Do not disconnect or close Minecraft."
unfrozen-staff: "&a%player% has been released."
unfrozen-target: "&aThe screenshare has ended. You may move again."
not-frozen: "&cThis player is not frozen."
blocked-command: "&cYou are frozen and may only use /msg, /r and /helpop."
world-not-found: "&cThe screenshare world configured in the config was not found."
teleport-failed: "&cTeleport failed. Check the configured world and coordinates."
reload-success: "&aConfiguration reloaded."

disconnect-warning: "&cLeaving the server or closing Minecraft during a screenshare may be treated as evidence destruction."
disconnect-broadcast: "&c%player% disconnected during an active screenshare."
evidence-destruction: "&4Closing Minecraft, logging out, uninstalling mods, deleting files or otherwise interfering with the screenshare may be treated as evidence destruction and can result in punishment."

